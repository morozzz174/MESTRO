name: metro_2
description: "Приложение для мастеров-замерщиков"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  
  # Database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Camera & Images
  image_picker: ^1.1.2
  camera: ^0.11.1
  
  # Geolocation
  geolocator: ^14.0.2
  
  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.5
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  
  assets:
    - assets/checklists/
    - assets/
