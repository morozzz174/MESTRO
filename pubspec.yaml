name: metro_2
description: "Приложение для мастеров-замерщиков"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  
  # Database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Camera & Images
  image_picker: ^1.1.2
  camera: ^0.11.1
  
  # Geolocation
  geolocator: ^14.0.2
  
  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1
  
  # Calendar
  table_calendar: ^3.1.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  http: ^1.2.2

  # Voice input
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1

  # URL launcher (звонки, карты)
  url_launcher: ^6.3.1

  # Excel экспорт
  excel: ^4.0.6
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.5
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/checklists/
    - assets/prices/
    - assets/fonts/
    - assets/
