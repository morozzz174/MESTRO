name: metro_2
description: "MESTRO — Мастер, Единый Стандарт Точности Расчёта Объекта. Приложение для замерщиков и строителей."
publish_to: 'none'
version: 1.2.0+12

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  
  # Database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Camera & Images
  image_picker: ^1.1.2
  
  # Geolocation
  geolocator: ^14.0.2
  
  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1
  
  # Calendar
  table_calendar: ^3.1.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  http: ^1.2.2
  flutter_dotenv: ^5.2.1

  # Voice input
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1

  # URL launcher (звонки, карты)
  url_launcher: ^6.3.1

  # Excel экспорт
  excel: ^4.0.6
  file_picker: ^8.1.2

  # TFLite AI
  tflite_flutter: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0d1b2a"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/checklists/
    - assets/prices/
    - assets/fonts/
    - assets/models/
    - assets/icon/
    - assets/consent_text.txt
    - assets/offer.md
    - assets/privacy_policy.md
    - assets/refund_policy.md
